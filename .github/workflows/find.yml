name: 替换仓库地址（FranzKafkaYu -> gm-cx）

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:    # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 消除 Node.js 20 警告

permissions:
  contents: write

jobs:
  replace-url:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 执行批量替换（所有文件）
        run: |
          OLD="github.com/FranzKafkaYu/x-ui"
          NEW="github.com/gm-cx/x-ui"
          echo "正在将所有文件中的 '$OLD' 替换为 '$NEW'"
          find . -type f -not -path "./.git/*" -exec sed -i "s#${OLD}#${NEW}#g" {} \;
          echo "已修改的文件："
          git status --short

      - name: 提交变更并强制推送（不拉取任何远程更新）
        run: |
          if git diff --quiet; then
            echo "没有检测到任何变更，跳过提交。"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "chore: 替换仓库地址为 github.com/gm-cx/x-ui（全文件）"
          # 直接强制推送到自己的远程仓库，不拉取任何远程更新
          git push --force origin main
